<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login — x1A Activity Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@300;400&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0f0f0f;
            --fg: #f5f5f5;
            --fg60: rgba(245, 245, 245, 0.6);
            --fg30: rgba(245, 245, 245, 0.25);
            --border: rgba(245, 245, 245, 0.15);
            --primary: #7c6ee0;
            --muted: #777;
            --anim: 400ms cubic-bezier(0.25, 1, 0.5, 1);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden
        }

        /* ── BLOBS ── */
        #grad-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.5
        }

        .b1 {
            width: 420px;
            height: 320px;
            background: radial-gradient(circle, #7c6ee0 0%, transparent 70%);
            bottom: -60px;
            left: -80px;
            animation: fl1 22s ease-in-out infinite
        }

        .b2 {
            width: 360px;
            height: 290px;
            background: radial-gradient(circle, #e06e8e 0%, transparent 70%);
            top: 0;
            right: -60px;
            animation: fl2 19s ease-in-out infinite
        }

        .b3 {
            width: 280px;
            height: 260px;
            background: radial-gradient(circle, #4eb8f0 0%, transparent 70%);
            top: 40%;
            left: 55%;
            animation: fl1 26s ease-in-out infinite 4s;
            opacity: 0.35
        }

        @keyframes fl1 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(-18px, 14px)
            }
        }

        @keyframes fl2 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(14px, -16px)
            }
        }

        /* ── BRAND ── */
        #brand {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 9px;
            z-index: 20;
            white-space: nowrap;
            text-decoration: none
        }


        #brand span {
            font-weight: 700;
            font-size: 15px;
            color: var(--fg);
            letter-spacing: -0.2px
        }

        /* ── LAYOUT ── */
        #center {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10
        }

        #card {
            width: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 26px
        }

        /* ── HEADING ── */
        .auth-title {
            font-family: 'EB Garamond', Georgia, serif;
            font-weight: 300;
            font-size: 46px;
            line-height: 1.12;
            text-align: center;
            color: var(--fg);
            letter-spacing: -0.5px
        }

        .auth-sub {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
            text-align: center;
            line-height: 1.6
        }

        /* ── SOCIAL BUTTONS ── */
        .social-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center
        }

        .gbtn {
            all: unset;
            cursor: pointer;
            border-radius: 9999px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 22px;
            font-size: 14px;
            font-weight: 600;
            color: var(--fg);
            backdrop-filter: blur(6px);
            background: linear-gradient(-75deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.04));
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.09), inset 0 -1px 1px rgba(0, 0, 0, 0.45), 0 3px 10px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform var(--anim), box-shadow var(--anim), opacity var(--anim);
            position: relative;
        }

        .gbtn:hover {
            transform: scale(0.972);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.12), 0 2px 14px rgba(124, 110, 224, 0.18)
        }

        .gbtn:active {
            transform: scale(0.955)
        }

        .gbtn.icon-only {
            padding: 0;
            width: 38px;
            height: 38px;
            justify-content: center;
            flex-shrink: 0
        }

        .gbtn svg {
            flex-shrink: 0
        }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 300px
        }

        .divider hr {
            flex: 1;
            border: none;
            border-top: 1px solid var(--border)
        }

        .divider span {
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: 1.5px
        }

        /* ── GLASS INPUT ── */
        .field-wrap {
            position: relative;
            width: 300px
        }

        .float-label {
            position: absolute;
            top: -19px;
            left: 16px;
            font-size: 11px;
            color: var(--muted);
            font-weight: 600;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none
        }

        .float-label.show {
            opacity: 1;
            transform: translateY(0)
        }

        .ginput {
            display: flex;
            align-items: center;
            border-radius: 9999px;
            padding: 4px 4px 4px 16px;
            backdrop-filter: blur(6px);
            background: linear-gradient(-75deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.04));
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.07), inset 0 -1px 1px rgba(0, 0, 0, 0.35), 0 2px 8px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.14);
            transition: box-shadow var(--anim), border-color var(--anim);
            gap: 8px;
        }

        .ginput:focus-within {
            border-color: rgba(124, 110, 224, 0.5);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.09), 0 0 0 1px rgba(124, 110, 224, 0.28), 0 4px 16px rgba(124, 110, 224, 0.15)
        }

        .ginput .ico {
            flex-shrink: 0;
            color: var(--fg60);
            display: flex;
            align-items: center;
            height: 36px;
            width: 18px;
            justify-content: center
        }

        .ginput input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--fg);
            font-size: 14px;
            padding: 9px 0;
            min-width: 0;
            caret-color: var(--primary);
        }

        .ginput input::placeholder {
            color: var(--fg60)
        }

        .ginput .peek-btn {
            all: unset;
            cursor: pointer;
            color: var(--fg60);
            padding: 7px;
            border-radius: 50%;
            display: none;
            align-items: center;
            transition: color 0.2s
        }

        .ginput .peek-btn:hover {
            color: var(--fg)
        }

        .ginput .peek-btn.vis {
            display: flex
        }

        .ginput .arr-slot {
            width: 0;
            overflow: hidden;
            flex-shrink: 0;
            transition: width var(--anim)
        }

        .ginput .arr-slot.show {
            width: 38px
        }

        /* ── FORGOT ── */
        .forgot {
            all: unset;
            cursor: pointer;
            font-size: 12px;
            color: var(--muted);
            text-align: right;
            display: block;
            width: 300px;
            transition: color 0.2s;
            letter-spacing: 0.1px
        }

        .forgot:hover {
            color: var(--fg60)
        }

        /* ── PRIMARY BUTTON ── */
        .submit-row {
            width: 300px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 14px
        }

        .btn-primary {
            all: unset;
            cursor: pointer;
            border-radius: 9999px;
            text-align: center;
            padding: 13px 0;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.3px;
            color: #fff;
            background: linear-gradient(135deg, #7c6ee0, #9b8ef5);
            box-shadow: 0 4px 20px rgba(124, 110, 224, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            transition: transform var(--anim), box-shadow var(--anim), opacity var(--anim);
            opacity: 0.4;
            pointer-events: none;
        }

        .btn-primary.active {
            opacity: 1;
            pointer-events: auto
        }

        .btn-primary.active:hover {
            transform: scale(0.975);
            box-shadow: 0 6px 24px rgba(124, 110, 224, 0.45)
        }

        .btn-primary.active:active {
            transform: scale(0.96)
        }

        /* ── DIVIDER TEXT ── */
        .or-row {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .or-row hr {
            flex: 1;
            border: none;
            border-top: 1px solid var(--border)
        }

        .or-row span {
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
            letter-spacing: 1.5px
        }

        /* ── FOOTER LINK ── */
        .footer-link {
            font-size: 13px;
            color: var(--muted);
            text-align: center
        }

        .footer-link a {
            color: rgba(155, 142, 245, 0.9);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s
        }

        .footer-link a:hover {
            color: #b8adff
        }

        /* ── MODAL ── */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(5px)
        }

        #modal-overlay.open {
            display: flex
        }

        #modal-box {
            background: rgba(20, 20, 24, 0.95);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 22px;
            padding: 38px 34px;
            width: calc(100% - 32px);
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            position: relative;
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)
        }

        @keyframes popIn {
            from {
                transform: scale(0.85);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        #modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            all: unset;
            cursor: pointer;
            color: var(--muted);
            padding: 7px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            transition: color 0.2s
        }

        #modal-close:hover {
            color: var(--fg)
        }

        .modal-msg {
            font-size: 16px;
            font-weight: 500;
            color: var(--fg);
            text-align: center;
            line-height: 1.5
        }

        /* spinner */
        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .spin-icon {
            animation: spin 0.9s linear infinite;
            display: block
        }

        /* confetti */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999
        }

        /* fade-in */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .fu {
            animation: fadeUp 0.4s ease both
        }

        .fu1 {
            animation-delay: 0s
        }

        .fu2 {
            animation-delay: 0.07s
        }

        .fu3 {
            animation-delay: 0.13s
        }

        .fu4 {
            animation-delay: 0.19s
        }

        .fu5 {
            animation-delay: 0.25s
        }

        .fu6 {
            animation-delay: 0.31s
        }

        .fu7 {
            animation-delay: 0.37s
        }

        /* password strength bar */
        .strength-bar-wrap {
            height: 3px;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            margin-top: 6px;
            width: 100%;
            opacity: 0;
            transition: opacity 0.3s
        }

        .strength-bar-wrap.show {
            opacity: 1
        }

        .strength-bar {
            height: 100%;
            border-radius: 9999px;
            width: 0;
            transition: width 0.4s ease, background 0.4s ease
        }

        input[type=password]::-ms-reveal,
        input[type=password]::-ms-clear {
            display: none
        }

        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px transparent inset !important;
            -webkit-text-fill-color: var(--fg) !important;
            transition: background-color 5000s 0s
        }
    </style>
</head>

<body>

    <canvas id="confetti-canvas"></canvas>
    <div id="grad-bg">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <a id="brand" href="#">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
            </svg>
        </div>
    </a>>

    <div id="center">
        <div id="card">

            <!-- heading -->
            <div class="fu fu1" style="text-align:center">
                <div class="auth-title">Welcome<br>back</div>
            </div>
            <div class="auth-sub fu fu2">Sign in to continue to your dashboard</div>

            <!-- social -->
            <div class="social-row fu fu3">
                <button class="gbtn" type="button" id="google-btn">
                    <svg viewBox="0 0 64 64" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                        <g fill-rule="evenodd" fill="none">
                            <g fill-rule="nonzero" transform="translate(3,2)">
                                <path fill="#4285F4"
                                    d="M57.8123233,30.1515267C57.8123233,27.7263183 57.6155321,25.9565533 57.1896408,24.1212666L29.4960833,24.1212666L29.4960833,35.0674653L45.7515771,35.0674653C45.4239683,37.7877475 43.6542033,41.8844383 39.7213169,44.6372555L39.6661883,45.0037254L48.4223791,51.7870338L49.0290201,51.8475849C54.6004021,46.7020943 57.8123233,39.1313952 57.8123233,30.1515267" />
                                <path fill="#34A853"
                                    d="M29.4960833,58.9921667C37.4599129,58.9921667 44.1456164,56.3701671 49.0290201,51.8475849L39.7213169,44.6372555C37.2305867,46.3742596 33.887622,47.5868638 29.4960833,47.5868638C21.6960582,47.5868638 15.0758763,42.4415991 12.7159637,35.3297782L12.3700541,35.3591501L3.26524241,42.4054492L3.14617358,42.736447C7.9965904,52.3717589 17.959737,58.9921667 29.4960833,58.9921667" />
                                <path fill="#FBBC05"
                                    d="M12.7159637,35.3297782C12.0932812,33.4944915 11.7329116,31.5279353 11.7329116,29.4960833C11.7329116,27.4640054 12.0932812,25.4976752 12.6832029,23.6623884L12.6667095,23.2715173L3.44779955,16.1120237L3.14617358,16.2554937C1.14708246,20.2539019 0,24.7439491 0,29.4960833C0,34.2482175 1.14708246,38.7380388 3.14617358,42.736447L12.7159637,35.3297782" />
                                <path fill="#EB4335"
                                    d="M29.4960833,11.4050769C35.0347044,11.4050769 38.7707997,13.7975244 40.9011602,15.7968415L49.2255853,7.66898166C44.1130815,2.91684746 37.4599129,0 29.4960833,0C17.959737,0 7.9965904,6.62018183 3.14617358,16.2554937L12.6832029,23.6623884C15.0758763,16.5505675 21.6960582,11.4050769 29.4960833,11.4050769" />
                            </g>
                        </g>
                    </svg>
                    <span>Google</span>
                </button>
                <button class="gbtn" type="button" id="github-btn">
                    <svg viewBox="0 0 16 16" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                        <path fill="currentColor"
                            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
                    </svg>
                    <span>GitHub</span>
                </button>
            </div>

            <div class="divider fu fu3">
                <hr><span>OR</span>
                <hr>
            </div>

            <!-- email -->
            <div class="field-wrap fu fu4">
                <div class="float-label" id="em-label">Email</div>
                <div class="ginput" id="em-ginput">
                    <div class="ico">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="4" width="20" height="16" rx="2" />
                            <polyline points="2,4 12,13 22,4" />
                        </svg>
                    </div>
                    <input id="em-input" type="email" placeholder="Email address" autocomplete="email" />
                </div>
            </div>

            <!-- password -->
            <div class="field-wrap fu fu5">
                <div class="float-label" id="pw-label">Password</div>
                <div class="ginput" id="pw-ginput">
                    <div class="ico" id="pw-ico">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                    </div>
                    <input id="pw-input" type="password" placeholder="Password" autocomplete="current-password" />
                    <button class="peek-btn" id="pw-peek" type="button" aria-label="Toggle password">
                        <svg id="pw-eye-svg" width="17" height="17" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                    <div class="arr-slot" id="pw-arr">
                        <button class="gbtn icon-only" type="button" id="go-btn" aria-label="Sign in"
                            style="width:38px;height:38px;">
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12" />
                                <polyline points="12 5 19 12 12 19" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- forgot -->
            <button class="forgot fu fu5" id="forgot-btn" type="button">Forgot password?</button>

            <!-- sign in button -->
            <div class="submit-row fu fu6">
                <button class="btn-primary" id="signin-btn" type="button">Sign in</button>
                <div class="or-row">
                    <hr><span>OR</span>
                    <hr>
                </div>
                <div class="footer-link">Don't have an account? <a href="sign-up.html">Sign up</a></div>
            </div>

        </div>
    </div>

    <!-- MODAL -->
    <div id="modal-overlay" role="dialog" aria-modal="true">
        <div id="modal-box">
            <button id="modal-close" aria-label="Close" style="display:none">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
            <div id="modal-icon"></div>
            <div class="modal-msg" id="modal-msg"></div>
            <div id="modal-action"></div>
        </div>
    </div>

    <script>
        (function () {
            /* --- elements --- */
            const emInput = document.getElementById('em-input');
            const emLabel = document.getElementById('em-label');
            const pwInput = document.getElementById('pw-input');
            const pwLabel = document.getElementById('pw-label');
            const pwPeek = document.getElementById('pw-peek');
            const pwArr = document.getElementById('pw-arr');
            const pwEyeSvg = document.getElementById('pw-eye-svg');
            const goBtn = document.getElementById('go-btn');
            const signinBtn = document.getElementById('signin-btn');
            const forgotBtn = document.getElementById('forgot-btn');
            const googleBtn = document.getElementById('google-btn');
            const githubBtn = document.getElementById('github-btn');
            const overlay = document.getElementById('modal-overlay');
            const mClose = document.getElementById('modal-close');
            const mIcon = document.getElementById('modal-icon');
            const mMsg = document.getElementById('modal-msg');
            const mAction = document.getElementById('modal-action');
            const cnv = document.getElementById('confetti-canvas');
            const ctx = cnv.getContext('2d');
            cnv.width = window.innerWidth; cnv.height = window.innerHeight;

            /* --- helpers --- */
            const isEmail = v => /\S+@\S+\.\S+/.test(v);
            const isPw = v => v.length >= 6;
            let pwVis = false, particles = [], animating = false;

            /* --- email --- */
            emInput.addEventListener('input', () => {
                emLabel.classList.toggle('show', emInput.value.length > 0);
                checkReady();
            });

            /* --- password --- */
            pwInput.addEventListener('input', () => {
                const v = pwInput.value;
                pwLabel.classList.toggle('show', v.length > 0);
                const ok = isPw(v);
                pwArr.classList.toggle('show', ok);
                pwPeek.classList.toggle('vis', v.length > 0);
                checkReady();
            });

            pwPeek.addEventListener('click', () => {
                pwVis = !pwVis;
                pwInput.type = pwVis ? 'text' : 'password';
                pwEyeSvg.innerHTML = pwVis
                    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>'
                    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8" fill="none"/>';
            });

            /* --- enter key --- */
            [emInput, pwInput].forEach(el => {
                el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); tryLogin(); } });
            });

            goBtn.addEventListener('click', tryLogin);
            signinBtn.addEventListener('click', tryLogin);

            function checkReady() {
                const ok = isEmail(emInput.value) && isPw(pwInput.value);
                signinBtn.classList.toggle('active', ok);
            }

            /* --- forgot password --- */
            forgotBtn.addEventListener('click', () => {
                showModal('info', 'Reset link sent! Check your inbox.');
            });

            /* --- social buttons --- */
            googleBtn.addEventListener('click', () => showModal('loading-social', 'Connecting to Google...'));
            githubBtn.addEventListener('click', () => showModal('loading-social', 'Connecting to GitHub...'));

            /* --- login --- */
            function tryLogin() {
                if (!isEmail(emInput.value) || !isPw(pwInput.value)) return;
                showModal('loading', null);
                const steps = ['Verifying credentials...', 'Loading your workspace...', 'Almost there...'];
                let i = 0;
                const iv = setInterval(() => {
                    i++;
                    if (i < steps.length) { mMsg.textContent = steps[i]; }
                    else {
                        clearInterval(iv);
                        showModal('success', 'You\'re signed in!');
                        fireCannons();
                    }
                }, 1400);
            }

            /* --- modal --- */
            function showModal(type, msg) {
                overlay.classList.add('open');
                mAction.innerHTML = '';
                if (type === 'loading' || type === 'loading-social') {
                    mClose.style.display = 'none';
                    mIcon.innerHTML = `<svg class="spin-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#7c6ee0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;
                    mMsg.textContent = type === 'loading' ? 'Verifying credentials...' : msg;
                    if (type === 'loading-social') {
                        setTimeout(() => closeModal(), 2000);
                    }
                } else if (type === 'error') {
                    mClose.style.display = 'block';
                    mIcon.innerHTML = `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#e06e6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
                    mMsg.textContent = msg;
                    mAction.innerHTML = `<button class="gbtn" onclick="closeModal()" style="margin-top:12px;padding:10px 24px">Try Again</button>`;
                } else if (type === 'success') {
                    mClose.style.display = 'block';
                    mIcon.innerHTML = `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6ee099" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/><polyline points="9 11 12 14 22 4"/></svg>`;
                    mMsg.textContent = msg;
                } else if (type === 'info') {
                    mClose.style.display = 'block';
                    mIcon.innerHTML = `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6eb8e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;
                    mMsg.textContent = msg;
                    mAction.innerHTML = `<button class="gbtn" onclick="closeModal()" style="margin-top:12px;padding:10px 24px">Got it</button>`;
                }
            }

            window.closeModal = function () { overlay.classList.remove('open'); };
            mClose.addEventListener('click', closeModal);
            overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

            /* --- confetti --- */
            function fireCannons() {
                const colors = ['#7c6ee0', '#e06e8e', '#6eb8e0', '#e0c06e', '#6ee0a0', '#e0826e', '#b0e06e'];
                for (let i = 0; i < 110; i++) {
                    particles.push({
                        x: Math.random() < 0.5 ? 0 : cnv.width, y: cnv.height,
                        vx: (Math.random() < 0.5 ? 1 : -1) * (2 + Math.random() * 5),
                        vy: -(6 + Math.random() * 10),
                        color: colors[Math.floor(Math.random() * colors.length)],
                        size: 4 + Math.random() * 5, gravity: 0.2, life: 1,
                        decay: 0.011 + Math.random() * 0.01,
                        angle: Math.random() * 360, spin: (Math.random() - 0.5) * 9
                    });
                }
                if (!animating) requestAnimationFrame(tick);
            }

            function tick() {
                animating = true;
                ctx.clearRect(0, 0, cnv.width, cnv.height);
                particles = particles.filter(p => p.life > 0);
                if (!particles.length) { animating = false; return; }
                particles.forEach(p => {
                    p.vy += p.gravity; p.x += p.vx; p.y += p.vy; p.life -= p.decay; p.angle += p.spin;
                    ctx.save(); ctx.globalAlpha = p.life; ctx.translate(p.x, p.y); ctx.rotate(p.angle * Math.PI / 180);
                    ctx.fillStyle = p.color; ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
                    ctx.restore();
                });
                requestAnimationFrame(tick);
            }

            window.addEventListener('resize', () => { cnv.width = window.innerWidth; cnv.height = window.innerHeight; });
        })();
    </script>
</body>
